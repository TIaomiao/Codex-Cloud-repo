name: Daily brief Notion sync

on:
  workflow_dispatch:
    inputs:
      json_path:
        description: "JSON file to sync"
        required: false
        default: "data/sample.json"
  schedule:
    # GitHub Actions uses UTC. 00:00 UTC = 08:00 Beijing time.
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  notion-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      INPUT_JSON_PATH: ${{ inputs.json_path || '' }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve daily JSON path
        id: daily-json
        run: |
          if [ -n "$INPUT_JSON_PATH" ]; then
            json_path="$INPUT_JSON_PATH"
          else
            json_path="data/$(TZ=Asia/Shanghai date +%F).json"
          fi

          echo "json_path=$json_path" >> "$GITHUB_OUTPUT"

          if [ ! -f "$json_path" ]; then
            echo "::error::Daily brief JSON not found: $json_path"
            echo "::error::Generate data/$(TZ=Asia/Shanghai date +%F).json before the Notion sync job runs."
            exit 1
          fi

      - name: Check Notion secrets
        run: |
          if [ -z "$NOTION_TOKEN" ] || [ -z "$NOTION_DATABASE_ID" ]; then
            echo "::error::NOTION_TOKEN or NOTION_DATABASE_ID is not configured."
            echo "::error::Dry-run alone does not write to Notion. Add both secrets in GitHub Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Validate Notion mapping
        run: npm run notion:test

      - name: Dry-run Notion properties
        run: node scripts/sync-to-notion.js "${{ steps.daily-json.outputs.json_path }}" --dry-run

      - name: Sync to Notion
        run: node scripts/sync-to-notion.js "${{ steps.daily-json.outputs.json_path }}"
